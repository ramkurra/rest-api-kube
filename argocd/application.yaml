apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rest-api-kube
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ramkurra/rest-api-kube.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: rest-api-kube
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
